<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير نهاية اليوم — فرع المدينة</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F8FA; --card: #FFFFFF; --primary: #1B3A6B; --accent: #2E75B6;
    --accent-light: #EBF3FB; --green: #217346; --green-light: #E8F5EE;
    --red: #C00000; --border: #E2E8F0; --text: #1A202C; --muted: #718096;
    --radius: 14px; --shadow: 0 2px 16px rgba(27,58,107,0.08);
  }
  body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }
  .header { background: var(--primary); color: white; padding: 20px 20px 28px; text-align: center; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 13px; opacity: 0.7; margin-top: 4px; }
  .date-badge { display: inline-block; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 14px; font-size: 12px; margin-top: 8px; }
  .steps-bar { display: flex; justify-content: center; gap: 6px; padding: 14px 20px 0; background: var(--primary); }
  .step-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: all 0.3s; }
  .step-dot.active { background: white; width: 24px; border-radius: 4px; }
  .step-dot.done { background: rgba(255,255,255,0.6); }
  .content { padding: 16px; max-width: 480px; margin: 0 auto; }
  .step { display: none; }
  .step.active { display: block; }
  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; margin-bottom: 14px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid var(--accent-light); display: flex; align-items: center; gap: 8px; }
  .card-title .icon { width: 28px; height: 28px; background: var(--accent-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; font-family: inherit; color: var(--text); background: white; transition: border-color 0.2s; -webkit-appearance: none; }
  .field input:focus, .field select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(46,117,182,0.1); }
  .field input[type="number"] { direction: ltr; text-align: right; }
  .input-wrap { position: relative; }
  .input-wrap .sar { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--muted); font-weight: 600; pointer-events: none; }
  .input-wrap input { padding-left: 40px; }
  .deposit-note { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .entries { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
  .entry-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: center; background: var(--bg); padding: 10px; border-radius: 10px; border: 1.5px solid var(--border); }
  .entry-row input, .entry-row select { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; font-family: inherit; width: 100%; background: white; -webkit-appearance: none; }
  .entry-row input:focus, .entry-row select:focus { outline: none; border-color: var(--accent); }
  .entry-row input[type="number"] { direction: ltr; text-align: right; }
  .btn-remove { background: #FEE2E2; color: var(--red); border: none; border-radius: 8px; width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .btn-add { width: 100%; padding: 11px; background: var(--accent-light); color: var(--accent); border: 1.5px dashed var(--accent); border-radius: 10px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .btn-add:hover { background: #D6E8F7; }
  .summary-box { background: var(--primary); color: white; border-radius: var(--radius); padding: 20px; margin-bottom: 14px; }
  .summary-box h3 { font-size: 13px; opacity: 0.7; margin-bottom: 16px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
  .summary-row:last-child { border-bottom: none; }
  .summary-row .label { opacity: 0.8; }
  .summary-row .val { font-weight: 600; font-family: 'Courier New', monospace; direction: ltr; }
  .summary-row.net { margin-top: 8px; padding-top: 14px; border-top: 2px solid rgba(255,255,255,0.3); font-size: 16px; }
  .summary-row.net .val { font-size: 20px; }
  .summary-row.deposit-row { opacity: 0.6; font-size: 13px; }
  .net-positive { color: #6EE7A0; }
  .net-negative { color: #FCA5A5; }
  .btn-next { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(46,117,182,0.3); }
  .btn-next:hover { background: #1B5E9E; transform: translateY(-1px); }
  .btn-back { width: 100%; padding: 14px; background: transparent; color: var(--muted); border: 1.5px solid var(--border); border-radius: var(--radius); font-size: 15px; font-family: inherit; cursor: pointer; margin-top: 8px; }
  .btn-back:hover { background: var(--bg); }
  .btn-submit { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: var(--radius); font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 4px 12px rgba(33,115,70,0.3); transition: all 0.2s; }
  .btn-submit:hover { background: #185C37; }
  .btn-submit:disabled { background: #CBD5E0; box-shadow: none; cursor: not-allowed; }
  .success-screen { text-align: center; padding: 40px 20px; display: none; }
  .success-screen.show { display: block; }
  .success-icon { width: 80px; height: 80px; background: var(--green-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 20px; }
  .success-screen h2 { font-size: 22px; color: var(--green); margin-bottom: 8px; }
  .success-screen p { color: var(--muted); font-size: 14px; margin-bottom: 30px; }
  .btn-new { padding: 14px 32px; background: var(--primary); color: white; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-left: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: #FEE2E2; color: var(--red); padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-top: 10px; display: none; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>تقرير نهاية اليوم</h1>
  <p>فرع المدينة — مصنع المجالس العربية للصناعة</p>
  <div class="date-badge" id="dateDisplay"></div>
</div>
<div class="steps-bar">
  <div class="step-dot active" id="dot0"></div>
  <div class="step-dot" id="dot1"></div>
  <div class="step-dot" id="dot2"></div>
</div>

<div class="content">

  <!-- Step 0: Sales -->
  <div class="step active" id="step0">
    <div class="card">
      <div class="card-title"><span class="icon">💰</span> المبيعات</div>

      <div class="field">
        <label>مبيعات كاش</label>
        <div class="input-wrap">
          <input type="number" id="salesCash" placeholder="0" min="0" inputmode="decimal">
          <span class="sar">﷼</span>
        </div>
      </div>

      <div class="field">
        <label>مبيعات الشبكة</label>
        <div class="input-wrap">
          <input type="number" id="salesNetwork" placeholder="0" min="0" inputmode="decimal">
          <span class="sar">﷼</span>
        </div>
      </div>

      <div class="field">
        <label>التحويلات</label>
        <div class="entries" id="transferEntries"></div>
        <button class="btn-add" onclick="addTransfer()">＋ إضافة تحويل</button>
      </div>

      <div class="divider"></div>

      <div class="field">
        <label>إيداع نقدي في البنك</label>
        <div class="input-wrap">
          <input type="number" id="cashDeposit" placeholder="0" min="0" inputmode="decimal">
          <span class="sar">﷼</span>
        </div>
        <p class="deposit-note">* لا يؤثر على الصافي — للتوثيق فقط</p>
      </div>

    </div>
    <button class="btn-next" onclick="goStep(1)">التالي ←</button>
  </div>

  <!-- Step 1: Expenses -->
  <div class="step" id="step1">
    <div class="card">
      <div class="card-title"><span class="icon">💸</span> المصاريف</div>
      <div class="entries" id="expenseEntries"></div>
      <button class="btn-add" onclick="addExpense()">＋ إضافة مصروف</button>
    </div>
    <button class="btn-next" onclick="goStep(2)">التالي ←</button>
    <button class="btn-back" onclick="goStep(0)">→ رجوع</button>
  </div>

  <!-- Step 2: Summary & Submit -->
  <div class="step" id="step2">
    <div class="summary-box" id="summaryBox"></div>
    <div class="field">
      <label style="color:var(--muted);font-size:13px;font-weight:600">ملاحظات (اختياري)</label>
      <input type="text" id="notes" placeholder="أي ملاحظات على اليوم...">
    </div>
    <div class="error-msg" id="errorMsg">حدث خطأ في الإرسال، تحقق من الاتصال وحاول مجدداً.</div>
    <button class="btn-submit" id="submitBtn" onclick="submitReport()">✓ إرسال التقرير</button>
    <button class="btn-back" onclick="goStep(1)">→ رجوع</button>
  </div>

  <!-- Success -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">✓</div>
    <h2>تم الإرسال بنجاح!</h2>
    <p>تم تسجيل تقرير اليوم في الشيت</p>
    <button class="btn-new" onclick="resetForm()">تقرير جديد</button>
  </div>

</div>

<script>
// ═══════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbi00xj2uIjas7y_lgRVDwrT73hEF2n8dIS3F8m0_umKlKDP-Aj-wolCmRojJxSol_AQ/exec";
const BRANCH_NAME = "فرع المدينة";
// ═══════════════════════════════════════

const BANKS = ["بنك الراجحي", "بنك الأهلي "];
const EXPENSE_CATS = ["صيانة سيارات","مياه","ملتون وبلويستر","نقل بضائع","شحن جوال"," وقود","متنوعة"];

let currentStep = 0;
const today = new Date();
document.getElementById('dateDisplay').textContent = today.toLocaleDateString('ar-SA-u-nu-latn', {
  weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
});

function goStep(n) {
  document.getElementById('step' + currentStep).classList.remove('active');
  document.querySelectorAll('.step-dot').forEach((d, i) => {
    d.className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
  });
  currentStep = n;
  document.getElementById('step' + n).classList.add('active');
  if (n === 2) buildSummary();
  window.scrollTo(0, 0);
}

let transferCount = 0;
function addTransfer() {
  transferCount++;
  const id = 'tr' + transferCount;
  const div = document.createElement('div');
  div.className = 'entry-row'; div.id = id;
  const opts = BANKS.map(b => `<option>${b}</option>`).join('');
  div.innerHTML = `
    <select>${opts}</select>
    <input type="number" placeholder="المبلغ" min="0" inputmode="decimal">
    <button class="btn-remove" onclick="removeEntry('${id}')">×</button>`;
  document.getElementById('transferEntries').appendChild(div);
}

let expenseCount = 0;
function addExpense() {
  expenseCount++;
  const id = 'exp' + expenseCount;
  const div = document.createElement('div');
  div.className = 'entry-row'; div.id = id;
  const opts = EXPENSE_CATS.map(c => `<option>${c}</option>`).join('');
  div.innerHTML = `
    <select>${opts}</select>
    <input type="number" placeholder="المبلغ" min="0" inputmode="decimal">
    <button class="btn-remove" onclick="removeEntry('${id}')">×</button>`;
  document.getElementById('expenseEntries').appendChild(div);
}

function removeEntry(id) { document.getElementById(id)?.remove(); }

function collectData() {
  const cash = parseFloat(document.getElementById('salesCash').value) || 0;
  const network = parseFloat(document.getElementById('salesNetwork').value) || 0;
  const deposit = parseFloat(document.getElementById('cashDeposit').value) || 0;

  const transfers = [];
  document.querySelectorAll('#transferEntries .entry-row').forEach(row => {
    const sel = row.querySelector('select');
    const inp = row.querySelector('input[type="number"]');
    const name = sel ? sel.value : 'تحويل';
    const amt = parseFloat(inp?.value) || 0;
    if (amt > 0) transfers.push({ name, amt });
  });
  const transferTotal = transfers.reduce((s, t) => s + t.amt, 0);

  const expenses = [];
  document.querySelectorAll('#expenseEntries .entry-row').forEach(row => {
    const sel = row.querySelector('select');
    const inp = row.querySelector('input[type="number"]');
    const cat = sel ? sel.value : 'متنوعة';
    const amt = parseFloat(inp?.value) || 0;
    if (amt > 0) expenses.push({ cat, amt });
  });
  const expenseTotal = expenses.reduce((s, e) => s + e.amt, 0);

  const totalSales = cash + network + transferTotal;
  const cashRemaining = cash - expenseTotal;

  return { cash, network, deposit, transfers, transferTotal, expenses, expenseTotal, totalSales, cashRemaining };
}

function fmt(n) {
  return n.toLocaleString('en-SA', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' ﷼';
}

function buildSummary() {
  const d = collectData();
  const cashClass = d.cashRemaining >= 0 ? 'net-positive' : 'net-negative';

  let rows = `<h3>ملخص تقرير اليوم — ${BRANCH_NAME}</h3>
    <div class="summary-row"><span class="label">مبيعات كاش</span><span class="val">${fmt(d.cash)}</span></div>
    <div class="summary-row"><span class="label">مبيعات شبكة</span><span class="val">${fmt(d.network)}</span></div>`;

  d.transfers.forEach(t => {
    rows += `<div class="summary-row"><span class="label">تحويل — ${t.name}</span><span class="val">${fmt(t.amt)}</span></div>`;
  });

  rows += `<div class="summary-row" style="font-weight:700"><span class="label">إجمالي الدخل</span><span class="val">${fmt(d.totalSales)}</span></div>`;

  if (d.expenses.length > 0) {
    rows += `<div class="summary-row" style="margin-top:6px"><span class="label" style="opacity:0.5;font-size:12px">── المصاريف ──</span></div>`;
    d.expenses.forEach(e => {
      rows += `<div class="summary-row"><span class="label">${e.cat}</span><span class="val">- ${fmt(e.amt)}</span></div>`;
    });
  }

  rows += `<div class="summary-row net"><span class="label">💵 الكاش المتبقي</span><span class="val ${cashClass}">${fmt(d.cashRemaining)}</span></div>`;

  if (d.deposit > 0) {
    rows += `<div class="summary-row deposit-row"><span class="label">🏦 إيداع نقدي في البنك</span><span class="val">${fmt(d.deposit)}</span></div>`;
  }

  document.getElementById('summaryBox').innerHTML = rows;
}

async function submitReport() {
  const btn = document.getElementById('submitBtn');
  const errMsg = document.getElementById('errorMsg');
  errMsg.style.display = 'none';
  const d = collectData();
  const notes = document.getElementById('notes').value.trim();

  const payload = {
    date: today.toLocaleDateString('en-GB'),
    branch: BRANCH_NAME,
    manager: BRANCH_NAME,
    salesCash: d.cash,
    salesNetwork: d.network,
    transfers: d.transfers.map(t => `${t.name}: ${t.amt}`).join(' | '),
    transferTotal: d.transferTotal,
    totalSales: d.totalSales,
    expenses: d.expenses.map(e => `${e.cat}: ${e.amt}`).join(' | '),
    expenseTotal: d.expenseTotal,
    cashDeposit: d.deposit,
    cashRemaining: d.cashRemaining,
    notes
  };

  btn.disabled = true;
  btn.innerHTML = 'جاري الإرسال <span class="spinner"></span>';

  if (APPS_SCRIPT_URL === "YOUR_APPS_SCRIPT_URL_HERE") {
    await new Promise(r => setTimeout(r, 1200));
    showSuccess(); return;
  }

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    showSuccess();
  } catch (e) {
    errMsg.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '✓ إرسال التقرير';
  }
}

function showSuccess() {
  document.getElementById('step2').classList.remove('active');
  document.getElementById('successScreen').classList.add('show');
  document.querySelectorAll('.step-dot').forEach(d => d.className = 'step-dot done');
}

function resetForm() { location.reload(); }

window.onload = () => { addTransfer(); addExpense(); };
</script>
</body>
</html>
